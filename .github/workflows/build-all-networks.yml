name: Build and Publish All Aggregated Price Feeds

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build unified feeds
        working-directory: ./scripts
        run: node build-all-networks-feeds.js

      - name: Deploy to aggregated-all-price-feeds branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan aggregated-all-price-feeds
          git rm -rf .
          
          # Only add the generated file
          git add all-networks.json
          git commit -m "chore: update aggregated price feeds for all networks"

          git push origin --force HEAD:aggregated-all-price-feeds
